<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
}

.container{
text-align:center;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
width:360px;
position:relative;
}

h1{
color:#ff4d6d;
margin-bottom:30px;
}

.buttons{
position:relative;
height:100px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
margin:10px;
transition:0.2s;
}

#yes{
background:#ff4d6d;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#eee;
position:absolute;
}

.result{
display:none;
margin-top:20px;
}

img{
width:200px;
border-radius:15px;
margin-top:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.heart{
position:fixed;
font-size:24px;
animation:explode 1.2s ease-out forwards;
}

@keyframes explode{
0%{
transform:scale(0.5) translateY(0);
opacity:1;
}
100%{
transform:scale(1.5) translateY(-200px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Do you like me? ❤️</h1>

<div class="buttons">
<button id="yes">Yes</button>
<button id="no">No</button>
</div>

<div class="result" id="result">
<h2>I knew it! 💕</h2>
<p>You just made my heart very happy.</p>
<img src="unnamed (1).jpg">
</div>

</div>

<script>

const noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",()=>{

const x=Math.random()*250;
const y=Math.random()*80;

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

});

document.getElementById("yes").onclick=function(){

document.getElementById("result").style.display="block";

for(let i=0;i<40;i++){
createHeart();
}

}

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1200);

}

</script>

</body>
</html>
